<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>《發現之前》第一章:重物的渴望(M1 灰盒)</title>
<style>
  /* R-ENV-04 灰盒紀律 */
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif; margin: 16px auto; max-width: 780px; line-height: 1.7; padding: 0 12px; }
  h1 { font-size: 1.2em; }
  #statusbar { border: 1px solid #666; padding: 6px 10px; margin-bottom: 10px; display: flex; gap: 18px; flex-wrap: wrap; font-variant-numeric: tabular-nums; }
  #title-screen, #game-screen { border: 1px solid #ccc; padding: 14px 18px; }
  #log { min-height: 200px; }
  .line { margin: 10px 0; }
  .line .spk { font-weight: bold; margin-right: 6px; }
  .line.stage { color: #555; font-style: italic; }
  .line.system { color: #333; border-left: 3px solid #999; padding-left: 8px; white-space: pre-wrap; }
  .line.player { color: #1a3c6e; }
  .scene-title { border-bottom: 1px solid #999; margin: 18px 0 8px; padding-bottom: 2px; font-weight: bold; }
  #controls { margin-top: 14px; }
  #controls button { display: block; margin: 6px 0; padding: 6px 12px; text-align: left; max-width: 100%; }
  #evidence { border: 1px dashed #666; padding: 6px 10px; margin-top: 12px; }
  .hint { color: #444; font-size: 0.92em; }
  button:focus-visible { outline: 3px solid #1a3c6e; }
</style>
</head>
<body>
<h1>《發現之前》第一章:重物的渴望</h1>
<p class="hint">M1 灰盒(序幕+第一幕)——文字與互動為正式內容,視覺為佔位。斜面實驗(第二幕)於 M2 接上;既有切片可由 <a href="index.html">index.html</a> 遊玩。</p>

<section id="title-screen" aria-label="標題畫面">
  <h2>標題</h2>
  <div id="continueWrap" style="display:none">
    <button id="btnContinue">繼續上次進度</button>
  </div>
  <fieldset style="margin-top:10px">
    <legend>新遊戲——選擇模式(R-MODE-01,中途不可換)</legend>
    <label><input type="radio" name="mode" value="explore" checked>探索模式(國中基準:引導較多)</label><br>
    <label><input type="radio" name="mode" value="scholar">學者模式(高中以上:加開追問與進階操作)</label><br>
    <button id="btnNew" style="margin-top:8px">開始新遊戲</button>
    <p class="hint" id="newWarn" style="display:none">注意:開始新遊戲將覆蓋既有存檔。再按一次確認。</p>
  </fieldset>
</section>

<section id="game-screen" style="display:none" aria-label="遊戲畫面">
  <div id="statusbar">
    <span>信譽:<b id="repVal">3</b>/5</span>
    <span id="modeVal"></span>
    <span id="sceneVal"></span>
  </div>
  <div id="log" aria-live="polite"></div>
  <div id="controls"></div>
  <div id="evidence"><b>旅人筆記(證據)</b>:<span id="evidenceList">(尚無)</span></div>
  <p class="hint"><button id="btnBackTitle">回標題(進度已自動存檔)</button></p>
</section>

<script src="data/scenes.js"></script>
<script src="src/narrative.js"></script>
<script src="src/chapter-ui.js"></script>
</body>
</html>
