<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:,">
<title>《發現之前》灰盒切片 v0.1.2 — 斜面實驗+P3 論辯</title>
<style>
  /* R-ENV-04 灰盒紀律:系統字體、原生控件、純文字、無裝飾 */
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif; margin: 16px; max-width: 1080px; line-height: 1.5; }
  h1 { font-size: 1.2em; } h2 { font-size: 1.05em; border-bottom: 1px solid #999; padding-bottom: 2px; }
  table { border-collapse: collapse; margin: 6px 0; }
  th, td { border: 1px solid #999; padding: 2px 8px; text-align: right; font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  #statusbar { border: 1px solid #666; padding: 6px 10px; margin-bottom: 10px; display: flex; gap: 18px; flex-wrap: wrap; }
  .tabbtn { margin-right: 6px; }
  .tabbtn[aria-selected="true"] { font-weight: bold; text-decoration: underline; }
  section.panel { display: none; border: 1px solid #ccc; padding: 10px 14px; }
  section.panel.active { display: block; }
  .msg { border: 1px dashed #666; padding: 6px 10px; margin: 6px 0; min-height: 1.2em; white-space: pre-wrap; }
  #debateLog { border: 1px solid #999; padding: 8px; min-height: 140px; max-height: 260px; overflow-y: auto; white-space: pre-wrap; }
  .broken { text-decoration: line-through; color: #666; }
  #victory { border: 3px double #333; padding: 10px 14px; margin-top: 10px; }
  textarea { width: 95%; }
  .hint { color: #444; font-size: 0.92em; }
</style>
</head>
<body>
<h1>《發現之前》灰盒切片 — 斜面實驗+一場論辯(v0.1.2)</h1>
<p class="hint">目標：實驗台產出數據 → 筆記中親自認證規律、完成兩項斷言 → 辯論廳擊破辛普里奧的目的論支柱。系統只記帳，不會替你看見規律。</p>

<div id="statusbar">
  <span>天數:<b id="dayCount">0</b></span>
  <span id="e3State"></span>
  <span id="persuasion"></span>
  <span id="p3Status"></span>
</div>

<div role="tablist" aria-label="遊戲面板">
  <button class="tabbtn" id="tab-lab" role="tab" aria-selected="true" aria-controls="panel-lab" data-panel="lab">實驗台</button>
  <button class="tabbtn" id="tab-notebook" role="tab" aria-selected="false" aria-controls="panel-notebook" data-panel="notebook">旅人筆記</button>
  <button class="tabbtn" id="tab-debate" role="tab" aria-selected="false" aria-controls="panel-debate" data-panel="debate">辯論廳</button>
</div>

<section class="panel active" id="panel-lab" role="tabpanel" aria-labelledby="tab-lab">
  <h2>實驗配置</h2>
  <label>球:<select id="selBall"></select></label>
  <label>槽面:<select id="selSurface"></select></label>
  <label>傾角:<select id="selIncline"></select></label>
  <label>計時:<select id="selTimer"></select></label>
  <button id="btnRun">執行實驗</button>
  <div class="msg" id="labMsg" role="status" aria-live="polite">尚未執行任何實驗。</div>
  <div id="lastRun"></div>
</section>

<section class="panel" id="panel-notebook" role="tabpanel" aria-labelledby="tab-notebook">
  <h2>實驗紀錄</h2>
  <fieldset style="border:none;padding:0;margin:0">
    <legend class="hint" style="padding:0">視圖切換(不影響已勾選的判定選集)</legend>
    <label><input type="radio" name="viewMode" value="inc" checked>增量視圖</label>
    <label><input type="radio" name="viewMode" value="cum">累計視圖</label>
  </fieldset>
  <button id="btnCompare">比較選取的兩筆紀錄</button>
  <table id="runsTable">
    <thead><tr><th>選</th><th>#</th><th>配置</th><th>Δ1</th><th>Δ2</th><th>Δ3</th><th>Δ4</th><th>天</th></tr></thead>
    <tbody id="runsBody"></tbody>
  </table>
  <div class="msg" id="compareMsg" role="status" aria-live="polite">尚無比較。</div>

  <h2>規律認證（勾選 1–3 筆實驗紀錄）</h2>
  <p class="hint">若你看出了什麼,預測下一段:第五段等時距的增量會是多少刻度?</p>
  <label>第五段增量預測值:<input type="number" id="prediction" step="0.1" style="width:90px"></label>
  <button id="btnJudge">認證規律</button>
  <div class="msg" id="judgeMsg" role="status" aria-live="polite">尚無主張。</div>

  <h2>主張紀錄</h2>
  <table id="claimsTable">
    <thead><tr><th>選</th><th>#</th><th>配置</th><th>預測</th><th>結果</th><th>天</th></tr></thead>
    <tbody id="claimsBody"></tbody>
  </table>
  <button id="btnAssertB">斷言:與球重無關(勾選兩筆主張)</button>
  <button id="btnAssertC">斷言:隨傾角形式不變(選做)</button>
  <div class="msg" id="assertMsg" role="status" aria-live="polite"></div>
</section>

<section class="panel" id="panel-debate" role="tabpanel" aria-labelledby="tab-debate">
  <h2>辛普里奧・目的論支柱</h2>
  <div id="statements"></div>
  <h2>出示證據</h2>
  <label>證據:
    <select id="selEvidence">
      <option value="E3">斜面規律主張</option>
      <option value="E1">高塔落球紀錄（存根）</option>
      <option value="S1">德爾夫特來的信（存根）</option>
    </select>
  </label>
  <label id="subitemWrap">子項:
    <select id="selSubitem">
      <option value="a">a 規律成立</option>
      <option value="b">b 與球重無關</option>
      <option value="c">c 隨傾角形式不變</option>
    </select>
  </label>
  <label>目標證詞:
    <select id="selTarget"><option value="s1">第一句證詞</option><option value="s2">第二句證詞</option><option value="s3">第三句證詞</option></select>
  </label>
  <button id="btnPresent">出示</button>
  <button id="btnReenter" style="display:none">再入辯論</button>
  <h2>辯論紀錄</h2>
  <div id="debateLog" role="log" aria-live="polite" aria-label="辯論紀錄"></div>
  <div id="victory" style="display:none" role="status"></div>
</section>

<script src="data/patterns.js"></script>
<script src="data/debate.js"></script>
<script src="src/engine.js"></script>
<script src="src/ui.js"></script>
</body>
</html>
