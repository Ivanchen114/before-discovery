<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>《發現之前》第一章:重物的渴望(舞台版)</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../public/assets/global/tokens.css">
<style>
  /* stage.html — 滿版舞台殼 v2(總監裁決 2026-07-19 第一輪視覺修正:
     筆記本模式取代抽屜/對話框左側半身像/字級放大 RWD)。
     引擎/資料/存檔與 chapter.html 完全共用;本檔只換表現層。灰盒版仍在 chapter.html。 */
  :root {
    --font-dialogue: "Noto Serif TC", "Source Han Serif TC", "Songti TC", Georgia, serif;
    --font-ui: system-ui, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  }
  html, body { height: 100%; margin: 0; }
  body { background: #14100c; overflow: hidden; color: var(--color-ink-primary);
         font-family: var(--font-ui);
         -webkit-user-select: none; user-select: none; }
  #stage { position: absolute; inset: 0; margin: auto;
           width: min(100vw, calc(100vh * 16 / 9)); height: min(100vh, calc(100vw * 9 / 16));
           overflow: hidden; background: #241b16; }

  /* --- 背景層 --- */
  #bgImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
           opacity: 0; transition: opacity var(--motion-medium) ease; }
  #bgFallback { position: absolute; inset: 0; background: #2a211a;
                display: flex; align-items: center; justify-content: center; }
  #bgFallback.off { display: none; }
  #fbTitle { color: rgba(230, 215, 189, 0.28); font-size: clamp(20px, 4vw, 44px);
             font-family: var(--font-dialogue); letter-spacing: 0.2em; }
  #vignette { position: absolute; inset: 0; pointer-events: none;
              box-shadow: inset 0 0 12vmin rgba(0,0,0,0.55); }

  /* --- HUD --- */
  #hud { position: absolute; top: 0; left: 0; right: 0; display: flex; gap: 6px; align-items: center;
         padding: 8px 10px; flex-wrap: wrap; z-index: 30; font-size: clamp(13px, 1.1vw, 16px); }
  #hud .chip { background: rgba(20, 14, 10, 0.72); color: #e6d7bd; padding: 4px 10px;
               border: 1px solid rgba(230, 215, 189, 0.25); border-radius: 3px;
               font-variant-numeric: tabular-nums; white-space: nowrap; }
  #hud .chip b { color: #fff; font-weight: 600; }
  #hud button { background: rgba(20, 14, 10, 0.72); color: #e6d7bd; border: 1px solid rgba(230,215,189,0.4);
                border-radius: 3px; padding: 6px 12px; font-size: inherit; cursor: pointer; min-height: 36px; }
  #hud button:hover { background: rgba(122, 75, 42, 0.8); }
  #hud .spacer { flex: 1; }
  #sceneChip { position: absolute; top: 46px; left: 10px; z-index: 29; font-size: 12px;
               color: rgba(230, 215, 189, 0.55); background: rgba(20,14,10,0.45); padding: 2px 8px; border-radius: 3px; }

  /* --- 中央面板(實驗台/辯論/回顧/史實) --- */
  #panelWrap { position: absolute; z-index: 20; display: none; overflow-y: auto;
               background: var(--color-surface-notebook); color: var(--color-ink-primary);
               border: 2px solid var(--color-chapter-accent); border-radius: 6px;
               box-shadow: 0 8px 30px rgba(0,0,0,0.5); padding: 14px 18px; line-height: 1.6;
               font-size: clamp(16px, 1.3vw, 18px); }
  body[data-view="lab"] #panelWrap { display: block; left: 4%; right: 4%; top: 9%; bottom: 6%; }
  body[data-view="review"] #panelWrap, body[data-view="histfacts"] #panelWrap {
    display: block; left: 10%; right: 10%; top: 10%; bottom: 8%; }
  body[data-view="debate"] #panelWrap { display: block; left: 3%; right: 3%; top: 9%; bottom: 32%;
    background: rgba(247, 240, 223, 0.96); }
  body[data-view="choice"] #panelWrap { display: block; left: auto; right: 3%; top: auto; bottom: 31%;
    max-width: 62%; background: none; border: none; box-shadow: none; padding: 0; overflow: visible; }
  body.held #panelWrap { visibility: hidden; }

  #panelWrap h3 { margin: 6px 0 4px; font-size: 1.05em; border-bottom: 1px solid var(--color-ink-secondary); }
  #panelWrap table { border-collapse: collapse; margin: 6px 0; font-size: clamp(16px, 1.2vw, 17px); }
  #panelWrap th, #panelWrap td { border: 1px solid var(--color-ink-secondary); padding: 3px 8px;
    text-align: right; font-variant-numeric: tabular-nums; }
  #panelWrap th:first-child, #panelWrap td:first-child { text-align: left; }
  .labmsg { border: 1px dashed var(--color-ink-secondary); padding: 4px 8px; margin: 6px 0; min-height: 1.2em; }
  #embedGate { margin-top: 10px; font-weight: bold; }
  #lab button, #controls button, #panelWrap button {
    background: var(--color-surface-world); color: var(--color-ink-primary);
    border: 1px solid var(--color-chapter-accent); border-radius: 4px;
    padding: 8px 16px; margin: 4px 4px 4px 0; cursor: pointer;
    font-size: clamp(16px, 1.3vw, 18px); min-height: 44px; }
  #lab button:hover, #controls button:hover { background: #d9c39a; }
  #lab button:disabled, #controls button:disabled { opacity: 0.45; cursor: default; }
  button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible { outline: 3px solid var(--color-focus); }
  #lab select, #lab input, #controls select { font-size: 1em; padding: 4px 6px; min-height: 36px; }

  /* 選項(choice)呈 VN 疊卡 */
  body[data-view="choice"] #controls button { display: block; margin: 8px 0 0 auto;
    background: rgba(20, 14, 10, 0.88); color: #e6d7bd; border: 1px solid rgba(230,215,189,0.5);
    padding: 10px 18px; border-radius: 4px; max-width: 100%; text-align: left; min-height: 44px;
    font-family: var(--font-dialogue); font-size: clamp(18px, 1.7vw, 24px); }
  body[data-view="choice"] #controls button:hover { background: rgba(122, 75, 42, 0.92); color: #fff; }
  body[data-view="choice"] #controls > p { text-align: right; color: rgba(230,215,189,0.8);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8); margin: 0; font-size: clamp(16px, 1.4vw, 20px); }

  /* 敘事(narration/end):繼續鈕縮成對話框角落的小膠囊 */
  body[data-view="narration"] #panelWrap, body[data-view="end"] #panelWrap {
    display: block; left: auto; right: 3.5%; top: auto; bottom: 4%; z-index: 26;
    background: none; border: none; box-shadow: none; padding: 0; overflow: visible; }
  body[data-view="narration"] #controls button, body[data-view="end"] #controls button {
    background: rgba(122, 75, 42, 0.9); color: #f3e9d5; border: 1px solid rgba(230,215,189,0.5);
    border-radius: 999px; padding: 6px 16px; font-size: clamp(14px, 1.2vw, 17px); min-height: 40px; }

  /* --- 對話框(v2:桌機約 28% 高;左側半身像) --- */
  #dialogue { position: absolute; z-index: 25; left: 3%; right: 3%; bottom: 3%;
              min-height: 28%; background: rgba(16, 11, 8, 0.88);
              border: 1px solid rgba(230, 215, 189, 0.35); border-top: 2px solid var(--color-chapter-accent);
              border-radius: 6px; padding: 16px 20px 18px; box-sizing: border-box; }
  body[data-view="title"] #dialogue, body[data-view="lab"] #dialogue,
  body[data-view="review"] #dialogue, body[data-view="histfacts"] #dialogue { display: none; }
  body.queue-active #dialogue { display: block !important; }
  #bust { position: absolute; left: 16px; bottom: 0; height: clamp(170px, 26vh, 220px);
          display: none; pointer-events: none;
          transition: filter var(--motion-fast) ease; }
  #dialogue.has-bust #bust { display: block; }
  #bust img { height: 100%; width: auto; display: block;
              /* 暫時 fallback:600×600 筆記頭像以柔邊墨暈遮罩呈現,不露方形米底(正式透明 WebP 由 Sol 供應) */ }
  #bust.masked img { -webkit-mask-image: radial-gradient(105% 105% at 50% 38%, #000 55%, transparent 78%);
                     mask-image: radial-gradient(105% 105% at 50% 38%, #000 55%, transparent 78%); }
  #bust.dim { filter: brightness(0.55) saturate(0.7); }
  #dialogue.has-bust #nameplate { left: 190px; }
  #dialogue.has-bust #dlgText { margin-left: 180px; }
  #nameplate { position: absolute; top: -14px; left: 16px; background: var(--color-chapter-accent);
               color: #f3e9d5; font-size: clamp(16px, 1.4vw, 20px); padding: 3px 16px;
               border-radius: 3px; letter-spacing: 0.08em; font-family: var(--font-dialogue); }
  #dlgText { color: #ece3d0; font-size: clamp(24px, 2.4vw, 34px); line-height: 1.55;
             font-family: var(--font-dialogue); min-height: 2.4em; white-space: pre-wrap; }
  #dlgText.narr { color: #c8bba2; font-style: italic; animation: bdFade var(--motion-fast) ease; }
  #dlgText.sys { color: #b7c4cf; font-size: 0.8em; animation: bdFade var(--motion-fast) ease; }
  #dlgText.pl { color: #d9e4f0; }
  @keyframes bdFade { from { opacity: 0; } to { opacity: 1; } }
  #dlgCue { position: absolute; right: 16px; bottom: 10px; color: #cfa96b; font-size: 16px;
            animation: bdBlink 1.1s step-end infinite; }
  @media (prefers-reduced-motion: reduce) {
    #bgImg, #bust { transition: none; }
    #dlgText.narr, #dlgText.sys { animation: none; }
    #dlgCue { animation: none; }
  }

  /* --- 旅人筆記(v2:全畫面筆記本模式,取代側抽屜) --- */
  #notebook { position: absolute; inset: 0; z-index: 40; background: rgba(10, 7, 5, 0.72);
              display: flex; align-items: center; justify-content: center;
              -webkit-user-select: text; user-select: text; }
  #notebook[hidden] { display: none; }
  #nbSheet { width: 92%; height: 88%; background: var(--color-surface-notebook);
             /* notebookBackground 資產掛點:Sol 交攤開筆記本底圖後由 JS 設 background-image(文字仍為 HTML) */
             color: var(--color-ink-primary); border-radius: 8px;
             border: 2px solid var(--color-chapter-accent); box-shadow: 0 12px 40px rgba(0,0,0,0.6);
             display: flex; flex-direction: column; padding: 10px 16px 14px; box-sizing: border-box; }
  #nbHead { display: flex; align-items: center; gap: 8px; }
  #nbHead h2 { font-family: var(--font-dialogue); font-size: clamp(18px, 1.6vw, 22px); margin: 4px 8px 4px 0; }
  #nbTabs { display: none; gap: 6px; }
  #nbTabs button, #btnDrawerClose { min-height: 44px; min-width: 44px; padding: 8px 16px;
    background: var(--color-surface-world); border: 1px solid var(--color-chapter-accent);
    border-radius: 4px; font-size: clamp(16px, 1.3vw, 18px); cursor: pointer; }
  #nbTabs button[aria-selected="true"] { background: var(--color-chapter-accent); color: #f3e9d5; }
  #nbHead .spacer { flex: 1; }
  #nbPages { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 0; }
  #nbLeft, #nbRight { overflow-y: auto; padding: 10px 18px; font-size: clamp(16px, 1.4vw, 20px); line-height: 1.7; }
  #nbLeft { border-right: 2px solid rgba(90, 70, 56, 0.35); } /* 書脊 */
  #nbLeft h3, #nbRight h3 { font-family: var(--font-dialogue); font-size: 1.05em;
    border-bottom: 1px solid var(--color-ink-secondary); margin: 8px 0 6px; }
  #evidence { border: 1px dashed var(--color-ink-secondary); padding: 8px 10px; margin-bottom: 8px; }
  #nbCards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 4px 0 10px; }
  .evcard { aspect-ratio: 8 / 5; background-size: cover; background-position: center;
            border: 1px solid var(--color-ink-secondary); border-radius: 4px;
            padding: 8px 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 2px; }
  .evcard b { font-family: var(--font-dialogue); font-size: 1em; color: var(--color-ink-primary);
              text-shadow: 0 1px 2px rgba(247,240,223,0.9); }
  .evcard span { font-size: 0.78em; color: var(--color-ink-secondary);
                 text-shadow: 0 1px 2px rgba(247,240,223,0.9); }
  #labProps { float: right; display: flex; gap: 8px; margin: 0 0 6px 10px; }
  #labProps img { height: 72px; width: auto; opacity: 0.92; }
  #tomeDecor { display: none; }
  body[data-view="debate"] #tomeDecor { display: block; float: right; height: 96px; width: auto;
    margin: 0 0 8px 12px; opacity: 0.92; }
  @media (max-height: 520px) { #labProps img { height: 48px; } body[data-view="debate"] #tomeDecor { height: 64px; } }
  #nbLabSnap table { border-collapse: collapse; margin: 6px 0; font-size: 0.92em; width: 100%; }
  #nbLabSnap th, #nbLabSnap td { border: 1px solid var(--color-ink-secondary); padding: 2px 7px;
    text-align: right; font-variant-numeric: tabular-nums; }
  #nbLabSnap th:first-child, #nbLabSnap td:first-child { text-align: left; }
  #log .line { margin: 8px 0; }
  #log .line .spk { font-weight: bold; margin-right: 6px; }
  #log .line.stage { color: var(--color-ink-secondary); font-style: italic; }
  #log .line.system { border-left: 3px solid var(--color-ink-secondary); padding-left: 8px; white-space: pre-wrap; }
  #log .line.player { color: var(--color-evidence); }
  #log .scene-title { border-bottom: 1px solid var(--color-ink-secondary); margin: 14px 0 6px;
                      padding-bottom: 2px; font-weight: bold; }
  #log .scene-banner { display: block; max-width: 100%; max-height: 140px; margin: 4px 0;
                       border: 1px solid var(--color-ink-secondary); }
  #log .portrait { width: 36px; height: 36px; object-fit: cover; vertical-align: middle;
                   margin-right: 6px; border: 1px solid var(--color-ink-secondary); }
  #log .composite { width: 36px; vertical-align: middle; margin-right: 6px; }

  /* --- 手機橫屏(低高度視窗) --- */
  @media (max-height: 520px) {
    #dialogue { min-height: 38%; padding: 12px 14px 14px; }
    #dlgText { font-size: clamp(20px, 4.4vh, 24px); }
    #bust { height: clamp(110px, 30vh, 150px); left: 10px; }
    #dialogue.has-bust #dlgText { margin-left: 120px; }
    #dialogue.has-bust #nameplate { left: 130px; }
    #hud #modeVal, #hud #e3Val { display: none; } /* HUD 收斂:留信譽/天數/說服力 */
    #sceneChip { display: none; }
    body[data-view="choice"] #panelWrap { bottom: 41%; }
    body[data-view="debate"] #panelWrap { bottom: 42%; }
    #nbSheet { width: 97%; height: 95%; }
    #nbPages { grid-template-columns: 1fr; }
    #nbLeft { border-right: none; }
    #nbTabs { display: flex; }
    #notebook[data-tab="evidence"] #nbRight { display: none; }
    #notebook[data-tab="log"] #nbLeft { display: none; }
  }

  /* --- 標題畫面 --- */
  #title-screen { position: absolute; inset: 0; z-index: 50; background: #1d1610;
                  display: flex; align-items: center; justify-content: center; overflow-y: auto; }
  #titleCard { text-align: center; color: #e6d7bd; max-width: 560px; padding: 24px;
               -webkit-user-select: text; user-select: text; }
  #titleCard .t1 { font-family: var(--font-dialogue);
                   font-size: clamp(34px, 6vw, 56px); letter-spacing: 0.3em; margin: 0 0 4px; }
  #titleCard .t2 { color: #cfa96b; font-size: clamp(15px, 2vw, 19px); letter-spacing: 0.15em; margin: 0 0 6px; }
  #titleCard .t2::after { content: ""; display: block; width: 180px; height: 1px; margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, rgba(207,169,107,0.7), transparent); }
  #titleCard fieldset, #titleCard details { border: 1px solid rgba(230,215,189,0.22);
    background: rgba(230,215,189,0.045); border-radius: 8px;
    text-align: left; padding: 14px 18px; margin-top: 16px; }
  #titleCard legend { padding: 0 8px; color: #cfa96b; font-family: var(--font-dialogue);
    letter-spacing: 0.12em; font-size: clamp(15px, 1.3vw, 17px); }
  #titleCard summary { color: #cfa96b; font-family: var(--font-dialogue); letter-spacing: 0.12em;
    font-size: clamp(15px, 1.3vw, 17px); cursor: pointer; padding: 2px 4px; }
  #titleCard summary:hover { color: #e6d7bd; }
  /* 模式選卡:原生 radio 隱形保留(鍵盤方向鍵可換),外觀由卡片承擔 */
  label.mode { display: block; margin: 10px 0; position: relative; }
  label.mode input { position: absolute; opacity: 0; pointer-events: none; }
  label.mode .mc { display: flex; flex-direction: column; gap: 2px; cursor: pointer; position: relative;
    border: 1px solid rgba(230,215,189,0.28); border-radius: 6px; padding: 12px 14px 12px 46px;
    transition: border-color var(--motion-instant) ease, background var(--motion-instant) ease; }
  label.mode .mc::before { content: ""; position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(230,215,189,0.5); box-sizing: border-box;
    transition: border-color var(--motion-instant) ease, background var(--motion-instant) ease; }
  label.mode .mc b { font-family: var(--font-dialogue); font-size: 1.08em; letter-spacing: 0.08em;
    color: #e6d7bd; font-weight: 600; }
  label.mode .mc small { color: rgba(230,215,189,0.62); font-size: 0.88em; }
  label.mode .mc:hover { border-color: rgba(230,215,189,0.55); background: rgba(230,215,189,0.05); }
  label.mode input:checked + .mc { border-color: var(--color-chapter-accent); background: rgba(122,75,42,0.28); }
  label.mode input:checked + .mc::before { border-color: #cfa96b; background: #e6d7bd;
    box-shadow: inset 0 0 0 3.5px #2a1d13; }
  label.mode input:checked + .mc b { color: #f6ecd8; }
  label.mode input:focus-visible + .mc { outline: 3px solid var(--color-focus); outline-offset: 2px; }
  /* 按鈕階層:主動作=章節棕,次動作=空心 */
  #titleCard button { background: var(--color-chapter-accent); color: #f3e9d5;
    border: 1px solid rgba(230,215,189,0.45); border-bottom-color: rgba(18,11,7,0.75);
    border-radius: 6px; padding: 10px 24px; font-size: clamp(16px, 1.4vw, 18px); cursor: pointer;
    margin-top: 10px; min-height: 44px; letter-spacing: 0.14em; font-family: var(--font-dialogue);
    transition: background var(--motion-instant) ease, transform var(--motion-instant) ease; }
  #titleCard button:hover { background: #935c35; }
  #titleCard button:active { transform: translateY(1px); }
  #btnExport { background: transparent; color: #cfa96b; border-color: rgba(207,169,107,0.55); }
  #btnExport:hover { background: rgba(122,75,42,0.35); color: #f3e9d5; }
  #continueWrap button { width: 100%; font-size: 1.14em; letter-spacing: 0.26em;
    box-shadow: 0 0 0 1px rgba(122,75,42,0.55), 0 6px 18px rgba(0,0,0,0.35); }
  .hint { font-size: clamp(13px, 1.1vw, 15px); color: rgba(230,215,189,0.75); }
  #titleCard label { font-size: clamp(15px, 1.3vw, 17px); }
  #titleCard textarea { width: 95%; background: rgba(230,215,189,0.1); color: #e6d7bd;
    border: 1px solid rgba(230,215,189,0.3); border-radius: 6px;
    padding: 8px; font-size: 13px; margin: 8px 0 2px; }
  #titleCard textarea:focus { border-color: #cfa96b; }
</style>
</head>
<body data-view="title">
<div id="stage" aria-label="遊戲舞台">

  <img id="bgImg" alt="">
  <div id="bgFallback"><span id="fbTitle">發現之前</span></div>
  <div id="vignette"></div>
  <div id="sceneChip"></div>

  <section id="game-screen" style="display:none" aria-label="遊戲畫面">
    <div id="hud">
      <span class="chip">信譽 <b id="repVal">3</b>/5</span>
      <span class="chip">第 <b id="dayVal">0</b> 天</span>
      <span class="chip" id="e3Val"></span>
      <span class="chip" id="perVal"></span>
      <span class="chip" id="modeVal"></span>
      <span class="chip" id="sceneVal" style="display:none"></span>
      <span class="spacer"></span>
      <button id="btnDrawer" type="button" aria-haspopup="dialog" aria-expanded="false">旅人筆記</button>
      <button id="btnBackTitle">回標題</button>
    </div>

    <div id="panelWrap">
      <div id="lab" style="display:none" aria-label="實驗台">
        <h3>實驗台</h3>
        <p class="hint" id="labHint" style="color:var(--color-ink-secondary)"></p>
        <label>球:<select id="labBall"></select></label>
        <label>槽面:<select id="labSurface"></select></label>
        <label>傾角:<select id="labIncline"></select></label>
        <label>計時:<select id="labTimer"></select></label>
        <button id="labRun">執行實驗</button>
        <div class="labmsg" id="labMsg" role="status" aria-live="polite">尚未執行實驗。</div>

        <h3>run 紀錄(勾選 1–3 筆同配置 → 預測第五段 → 認證)</h3>
        <table><thead><tr><th>選</th><th>#</th><th>配置</th><th>Δ1</th><th>Δ2</th><th>Δ3</th><th>Δ4</th><th>天</th></tr></thead>
          <tbody id="labRunsBody"></tbody></table>
        <label>第五段增量預測值:<input type="number" id="labPred" step="0.1" style="width:90px"></label>
        <button id="labJudge">認證規律</button>
        <div class="labmsg" id="judgeMsg" role="status" aria-live="polite"></div>

        <h3>主張紀錄(勾選兩筆 → 斷言)</h3>
        <table><thead><tr><th>選</th><th>#</th><th>配置</th><th>預測</th><th>結果</th><th>天</th></tr></thead>
          <tbody id="labClaimsBody"></tbody></table>
        <button id="labAssertB">斷言:與球重無關</button>
        <button id="labAssertC" style="display:none">斷言:隨傾角形式不變</button>
        <div class="labmsg" id="assertMsg" role="status" aria-live="polite"></div>
        <div id="embedGate"></div>
      </div>
      <div id="controls"></div>
    </div>

    <div id="dialogue">
      <div id="bust" aria-hidden="true"></div>
      <span id="nameplate" style="display:none"></span>
      <div id="dlgText" aria-hidden="true"></div>
      <span id="dlgCue" style="display:none">▼</span>
    </div>

    <div id="notebook" role="dialog" aria-modal="true" aria-label="旅人筆記" data-tab="evidence" hidden>
      <div id="nbSheet">
        <div id="nbHead">
          <h2>旅人筆記</h2>
          <div id="nbTabs" role="tablist" aria-label="筆記分頁">
            <button id="nbTabEvidence" role="tab" aria-selected="true">證據/實驗</button>
            <button id="nbTabLog" role="tab" aria-selected="false">完整紀錄</button>
          </div>
          <span class="spacer"></span>
          <button id="btnDrawerClose" type="button">關閉 ✕</button>
        </div>
        <div id="nbPages">
          <section id="nbLeft" aria-label="證據與實驗紀錄">
            <h3>證據</h3>
            <div id="nbCards"></div>
            <div id="evidence"><b>證據</b>:<span id="evidenceList">(尚無)</span></div>
            <h3>實驗紀錄(快照)</h3>
            <div id="nbLabSnap"><p class="hint" style="color:var(--color-ink-secondary)">(尚無實驗紀錄)</p></div>
          </section>
          <section id="nbRight" aria-label="完整紀錄">
            <h3>完整紀錄</h3>
            <div id="log" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </div>
  </section>

  <section id="title-screen" aria-label="標題畫面">
    <div id="titleCard">
      <p class="t1">發現之前</p>
      <p class="t2">第一章:重物的渴望</p>
      <div id="continueWrap" style="display:none">
        <button id="btnContinue">繼續上次進度</button>
      </div>
      <fieldset>
        <legend>新遊戲——選擇模式(中途不可換)</legend>
        <label class="mode"><input type="radio" name="mode" value="explore" checked>
          <span class="mc"><b>探索模式</b><small>國中基準——引導較多,跟著伽利略的問題走</small></span>
        </label>
        <label class="mode"><input type="radio" name="mode" value="scholar">
          <span class="mc"><b>學者模式</b><small>高中以上——加開追問、音格計時與進階斷言</small></span>
        </label>
        <button id="btnNew">開始新遊戲</button>
        <p class="hint" id="newWarn" style="display:none">注意:開始新遊戲將覆蓋既有存檔。再按一次確認。</p>
      </fieldset>
      <details>
        <summary>旅人書信碼(跨機續玩)</summary>
        <button id="btnExport" style="display:none">匯出書信碼(複製+下載)</button>
        <textarea id="letterCode" rows="2" aria-label="書信碼" placeholder="把書信碼貼在這裡……"></textarea>
        <button id="btnImport">貼碼續玩</button>
        <p class="hint" id="letterMsg">貼碼續玩會覆蓋本機現有進度;共機環境請先各自匯出。</p>
      </details>
      <p class="hint">灰盒對照版:<a href="chapter.html" style="color:#cfa96b">chapter.html</a>(同一份存檔,兩版互通)</p>
    </div>
  </section>

</div>
