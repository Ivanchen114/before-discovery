<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">K2 地上與天上的同一把尺</title>
  <desc id="desc">地表一秒落下四點九公尺，距離放大六十倍、時間放大六十倍時，反平方律預測月球也偏離切線四點九公尺。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#151d2a"/><stop offset="1" stop-color="#070a10"/></linearGradient></defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="682" rx="24" fill="none" stroke="#8ca3b3" stroke-width="2"/>
  <text x="70" y="92" fill="#f3e8cc" font-size="38" font-weight="700" font-family="Noto Serif TC, PingFang TC, serif">K2｜地上與天上的同一把尺</text>
  <text x="70" y="130" fill="#aebdca" font-size="20" font-family="Noto Sans TC, PingFang TC, sans-serif">不是把蘋果直接外推到月亮；先把距離、時間與作用強度一起換算。</text>

  <rect x="70" y="170" width="300" height="330" rx="18" fill="#111a24" stroke="#64788a"/>
  <text x="220" y="215" text-anchor="middle" fill="#e9dcbf" font-size="25" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">地表基準</text>
  <circle cx="220" cy="350" r="100" fill="#2e6280" stroke="#9fc6d6" stroke-width="5"/>
  <circle cx="220" cy="242" r="12" fill="#ded4b7" stroke="#fff0bd" stroke-width="3"/>
  <path d="M220 260 L220 330" stroke="#efcc78" stroke-width="7"/>
  <text x="220" y="410" text-anchor="middle" fill="#f1cf8f" font-size="25" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">1 秒 → 4.9 m</text>
  <text x="220" y="452" text-anchor="middle" fill="#b7c3ca" font-size="18" font-family="Noto Sans TC, PingFang TC, sans-serif">教學用量級基準</text>

  <rect x="430" y="170" width="340" height="330" rx="18" fill="#1b2634" stroke="#8196a8"/>
  <text x="600" y="215" text-anchor="middle" fill="#e9dcbf" font-size="25" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">跨尺度換算</text>
  <text x="600" y="285" text-anchor="middle" fill="#f1cf8f" font-size="32" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">距離 × 60</text>
  <text x="600" y="335" text-anchor="middle" fill="#f1cf8f" font-size="32" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">時間 × 60</text>
  <line x1="500" y1="365" x2="700" y2="365" stroke="#71869a" stroke-width="2"/>
  <text x="600" y="410" text-anchor="middle" fill="#9dd2eb" font-size="30" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">作用 ÷ 60²</text>
  <text x="600" y="452" text-anchor="middle" fill="#b7c3ca" font-size="18" font-family="Noto Sans TC, PingFang TC, sans-serif">時間平方與距離平方正好抵銷</text>

  <rect x="830" y="170" width="300" height="330" rx="18" fill="#111a24" stroke="#64788a"/>
  <text x="980" y="215" text-anchor="middle" fill="#e9dcbf" font-size="25" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">月球量級</text>
  <circle cx="925" cy="350" r="76" fill="#2e6280" stroke="#9fc6d6" stroke-width="5"/>
  <circle cx="1070" cy="350" r="14" fill="#ded4b7" stroke="#fff0bd" stroke-width="3"/>
  <path d="M1070 330 L1070 375" stroke="#efcc78" stroke-width="7"/>
  <line x1="1002" y1="350" x2="1054" y2="350" stroke="#73899c" stroke-width="3" stroke-dasharray="7 6"/>
  <text x="980" y="410" text-anchor="middle" fill="#f1cf8f" font-size="25" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">60 秒 → 4.9 m</text>
  <text x="980" y="452" text-anchor="middle" fill="#b7c3ca" font-size="18" font-family="Noto Sans TC, PingFang TC, sans-serif">偏離原切線的量級</text>

  <text x="85" y="552" fill="#b7c3ca" font-size="19" font-family="Noto Sans TC, PingFang TC, sans-serif">至少比較兩條律：</text>
  <rect x="270" y="525" width="220" height="62" rx="12" fill="#492d26" stroke="#a86955"/>
  <text x="380" y="564" text-anchor="middle" fill="#f0d6c5" font-size="21" font-family="Noto Sans TC, PingFang TC, sans-serif">n＝0 → 17,640 m</text>
  <rect x="510" y="525" width="220" height="62" rx="12" fill="#493b27" stroke="#a98a54"/>
  <text x="620" y="564" text-anchor="middle" fill="#f1dfba" font-size="21" font-family="Noto Sans TC, PingFang TC, sans-serif">n＝1 → 294 m</text>
  <rect x="750" y="515" width="350" height="82" rx="14" fill="#314d3b" stroke="#9fbd8e" stroke-width="3"/>
  <text x="925" y="550" text-anchor="middle" fill="#e9f2de" font-size="24" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">n＝2 → 4.9 m ✓</text>
  <text x="925" y="580" text-anchor="middle" fill="#c9dfbf" font-size="17" font-family="Noto Sans TC, PingFang TC, sans-serif">取得下一次預測的資格</text>

  <rect x="120" y="625" width="960" height="58" rx="14" fill="#25364a" stroke="#7f9bb1"/>
  <text x="600" y="663" text-anchor="middle" fill="#f5e6be" font-size="23" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">一次相合還不是證明；它只讓反平方律有資格去碰沒看過的資料。</text>
</svg>
