<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">K5 能算到哪裡，也要停在哪裡</title>
  <desc id="desc">把四份證據接成證明鏈，將方向、出版、觀測與證明分別署名，並把引力如何作用的機制欄留白。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#191a20"/><stop offset="1" stop-color="#09090d"/></linearGradient><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#9ab2c4"/></marker></defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="682" rx="24" fill="none" stroke="#9f927a" stroke-width="2"/>
  <text x="70" y="92" fill="#f3e8cc" font-size="38" font-weight="700" font-family="Noto Serif TC, PingFang TC, serif">K5｜能算到哪裡，也要停在哪裡</text>
  <text x="70" y="130" fill="#bdb4a3" font-size="20" font-family="Noto Sans TC, PingFang TC, sans-serif">證據鏈、信用線與機制空白，必須在同一張校樣上同時站住。</text>

  <g font-family="Noto Sans TC, PingFang TC, sans-serif">
    <rect x="70" y="180" width="1060" height="170" rx="18" fill="#151c26" stroke="#66798a"/>
    <text x="100" y="222" fill="#d9c9aa" font-size="22" font-weight="700">證明鏈</text>
    <g font-size="17" font-weight="700" text-anchor="middle">
      <circle cx="190" cy="285" r="43" fill="#536843" stroke="#e4ce82" stroke-width="4"/><text x="190" y="281" fill="#f2e9d4">K1</text><text x="190" y="307" fill="#dce7d7" font-size="14">改向</text>
      <path d="M235 285L335 285" stroke="#9ab2c4" stroke-width="4" marker-end="url(#arr)"/>
      <circle cx="385" cy="285" r="43" fill="#536843" stroke="#e4ce82" stroke-width="4"/><text x="385" y="281" fill="#f2e9d4">K2</text><text x="385" y="307" fill="#dce7d7" font-size="14">跨尺度</text>
      <path d="M430 285L530 285" stroke="#9ab2c4" stroke-width="4" marker-end="url(#arr)"/>
      <circle cx="580" cy="285" r="43" fill="#536843" stroke="#e4ce82" stroke-width="4"/><text x="580" y="281" fill="#f2e9d4">K3</text><text x="580" y="307" fill="#dce7d7" font-size="14">預測</text>
      <path d="M625 285L725 285" stroke="#9ab2c4" stroke-width="4" marker-end="url(#arr)"/>
      <circle cx="775" cy="285" r="43" fill="#536843" stroke="#e4ce82" stroke-width="4"/><text x="775" y="281" fill="#f2e9d4">K4</text><text x="775" y="307" fill="#dce7d7" font-size="14">反驗</text>
      <path d="M820 285L920 285" stroke="#9ab2c4" stroke-width="4" marker-end="url(#arr)"/>
      <circle cx="970" cy="285" r="43" fill="#536843" stroke="#e4ce82" stroke-width="4"/><text x="970" y="281" fill="#f2e9d4">K5</text><text x="970" y="307" fill="#dce7d7" font-size="14">邊界</text>
    </g>

    <rect x="70" y="380" width="650" height="245" rx="18" fill="#181c20" stroke="#786d5d"/>
    <text x="100" y="425" fill="#d9c9aa" font-size="22" font-weight="700">四種工作，各回自己的來源</text>
    <text x="105" y="474" fill="#efcf8b" font-size="19" font-weight="700">Hooke</text><text x="250" y="474" fill="#d5d0c6" font-size="18">1679：把切線運動與向中心吸引放進同一問題</text>
    <text x="105" y="514" fill="#efcf8b" font-size="19" font-weight="700">Halley</text><text x="250" y="514" fill="#d5d0c6" font-size="18">1684 追問與出版推動</text>
    <text x="105" y="554" fill="#efcf8b" font-size="19" font-weight="700">Flamsteed</text><text x="250" y="554" fill="#d5d0c6" font-size="18">行星、衛星與彗星觀測</text>
    <text x="105" y="594" fill="#efcf8b" font-size="19" font-weight="700">Newton</text><text x="250" y="594" fill="#d5d0c6" font-size="18">數學證明與跨天體整合</text>

    <rect x="750" y="380" width="380" height="245" rx="18" fill="#2d2520" stroke="#a88764" stroke-width="2"/>
    <text x="780" y="425" fill="#e7d4b8" font-size="22" font-weight="700">機制欄</text>
    <rect x="785" y="455" width="310" height="90" rx="10" fill="#e5d7bd" stroke="#a28c6d" stroke-dasharray="9 7" stroke-width="3"/>
    <text x="940" y="493" text-anchor="middle" fill="#6d5b48" font-size="18">引力如何穿過空間作用？</text>
    <text x="940" y="524" text-anchor="middle" fill="#8b3f36" font-size="25" font-weight="700">尚無來源｜留白</text>
    <text x="940" y="580" text-anchor="middle" fill="#d7c4aa" font-size="18">可計算規則已成立</text>
    <text x="940" y="608" text-anchor="middle" fill="#d7c4aa" font-size="18">不等於作用機制已解釋</text>
  </g>

  <rect x="120" y="650" width="960" height="50" rx="14" fill="#25364a" stroke="#7f9bb1"/>
  <text x="600" y="683" text-anchor="middle" fill="#f5e6be" font-size="22" font-weight="700" font-family="Noto Sans TC, PingFang TC, sans-serif">寫清楚，不是寫大方；留下空白，也不是留下漏洞。</text>
</svg>
